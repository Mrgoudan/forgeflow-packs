# BSC review — AI-ONLY. There is no no-AI/machine-only path: the review is
# done by the GLM agent (lens) and adversarially confirmed by the agent
# (refute). If the AI breaks down the review PARKS and is re-queued; it
# never produces or posts items without AI. The only deterministic step
# is the manual gate — a governance precondition, not a code review.
workflow: review
consumes: [review.requested]
emits: [review.completed, item.triaged, item.rejected]

steps:
  - name: workspace
    block: worktree.create
    timeout_s: 120
    params: { repo: "{paths.repo}", base: "{payload.branch}" }
    outcomes: { ok: diff, dirty: failed, timeout: failed }

  - name: diff
    block: review.diff
    timeout_s: 60
    params: { base: "{payload.base}" }
    outcomes: { ok: ensure_base, empty: done, error: failed, timeout: failed }

  # (no separate manual gate: "semantics changed without a manual update" is
  # now a soft signal in the bsc_manual context — the AI judges whether the
  # change alters DOCUMENTED behavior, instead of flagging every compiler fix.)

  - name: ensure_base                # before each review: pull base + ensure
    block: bsc.ensure_base           # the base baseline. Cached (base
    timeout_s: 3600                  # unchanged) = FREE; else rebuild base clang.
    params:
      repo: "{paths.repo}"
      build_dir: "{paths.repo}/build"
      baseline_root: "{pack.baseline_root}"
    outcomes: { cached: build, built: record_base, error: build, timeout: build }

  - name: record_base                # snapshot the freshly-built base clang's
    block: hunt.probe_sweep          # probe outputs (only when base advanced)
    timeout_s: 900
    params:
      mode: record
      probes_dir: "{pack.probes_dir}"
      cmd: "{pack.probe_cmd}"
      max_workers: "{pack.probe_workers}"
      baseline_root: "{pack.baseline_root}"
      repo: "{paths.repo}"
    outcomes: { clean: build, items: build, error: build, timeout: build }

  - name: build                      # evidence gate: build PR clang (per
    block: evidence.build            # review, incremental).
    timeout_s: 3600
    params:
      cmd: "{pack.build_cmd}"
      repo: "{paths.repo}"
    outcomes: { green: sweep, red: lens, error: sweep, timeout: sweep }

  - name: sweep                      # diff PR clang vs the CACHED base baseline
    block: hunt.probe_sweep          # (recorded by refresh_base, keyed by base
    timeout_s: 1800                  # rev) — head-vs-base, no per-review base build.
    params:
      mode: diff
      probes_dir: "{pack.probes_dir}"
      cmd: "{pack.probe_cmd}"
      max_workers: "{pack.probe_workers}"
      baseline_root: "{pack.baseline_root}"
      repo: "{paths.repo}"
    outcomes: { clean: lens, items: lens, error: lens, timeout: lens }

  - name: lens                       # AI review — the ONLY thing that finds
    block: agent.run                 # code defects. No machine-only fallback.
    llm: review                      # -> GLM via claude-cli (skills load)
    schema: review_findings
    timeout_s: 1800
    context:
      - payload                      # incl. the PR's title + description (intent)
      - probe_results                # which probes diverged in the sweep
      - bsc_manual                   # manual status + TOC; CHANGED overrides skills
      - bsc_notes                    # compiler-internals notes index (read on demand)
      - patterns                     # defect-class lenses for the AI to hunt
      - history
      - lessons: { task_kind: review }
    outcomes:
      FINDINGS: file
      CLEAN: adjudicate               # AI ran and found nothing = a valid review
      # BSC MUST be AI-reviewed: any AI breakdown parks -> the daemon's
      # unpark tick re-queues it for another run. No machine-only degrade.
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: file
    block: review.file_findings
    timeout_s: 30
    params: { repo: "{paths.repo}" }
    outcomes: { ok: refute }

  - name: refute
    block: agent.run
    llm: refute                      # -> GLM via claude-cli (skills load)
    schema: refute_decisions
    timeout_s: 1800
    context:
      - payload
      - candidates
      - bsc_manual                   # manual wins here too, at confirm time
    outcomes:
      DECIDED: adjudicate
      NONE: adjudicate
      # confirmation is part of the AI review — a breakdown re-queues, never
      # posts unvetted items.
      agent_limit: parked
      agent_backend: parked
      agent_invalid: parked
      timeout: parked

  - name: adjudicate
    block: review.adjudicate
    timeout_s: 30
    outcomes: { ok: announce }

  - name: announce
    block: event.emit
    timeout_s: 10
    params:
      name: review.completed
      data:
        request: "{payload}"
        confirmed: "{prev.confirmed}"
        items: "{prev.items}"
    outcomes: { ok: done }
