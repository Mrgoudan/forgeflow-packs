# Campaign start: seed the region surface, build base clang once, run the
# no-AI finders (probe regression sweep), then kick off the explorer auto-swap
# loop. Trigger with: emit hunt.round_requested {base: <branch>}.
#
# The knowledge bench (methods/findings/patterns/chains + readings) is NOT
# ingested here — it persists in the db, ported once by `run-bsc.sh port`
# (re-run that only when the vault changes).
workflow: hunt_round
consumes: [hunt.round_requested]
emits: [hunt.explore_requested]

steps:
  - name: seed                       # region surface: whole-feature dirs + guarded files
    block: hunt.seed
    timeout_s: 120
    params:
      repo: "{paths.repo}"
      regions: "{pack.hunt_regions}"
      region_grep: "{pack.hunt_region_grep}"
      region_scan: "{pack.hunt_region_scan}"
    outcomes: { ok: build_base }

  - name: build_base                 # base clang once for the whole campaign
    block: shell.run
    timeout_s: 7200
    params: { cmd: "{pack.refresh_cmd}" }
    outcomes: { ok: sweep, nonzero: failed, mismatch: failed, timeout: failed }

  - name: sweep                      # no-AI finder: probe regressions vs oracle
    block: hunt.probe_sweep
    timeout_s: 900
    params:
      mode: oracle
      probes_dir: "{pack.probes_dir}"
      cmd: "{pack.probe_cmd}"
      max_workers: "{pack.probe_workers}"
      repo: "{paths.repo}"
    outcomes: { clean: kick, findings: kick, error: kick, timeout: kick }

  - name: kick                       # start the explorer loop
    block: event.emit
    timeout_s: 10
    params: { name: hunt.explore_requested, data: { round: 0 } }
    outcomes: { ok: done }
