# Oracle-Scout (HUNT.md): fired when the explore loop saturates the current
# arsenal. The scout invents NEW detection methods from the confirmed
# findings + the pattern catalogue; merge_scout inserts them and reopens the
# hunt (emit hunt.explore_requested) — or, if the scout has no new idea, the
# campaign ends here. This is the meta-loop that grows the methods bench.
workflow: hunt_scout
consumes: [hunt.scout_requested]
emits: [hunt.explore_requested]

steps:
  - name: scout                      # GLM oracle-scout (invents methods)
    block: agent.run
    llm: scout
    schema: scout_result
    timeout_s: 1800
    context:
      - hunt_arsenal                 # active + exhausted bench, confirmed findings
      - patterns                     # known defect classes to build generators for
      - bsc_manual                   # authoritative correct behavior
      - lessons: { task_kind: bughunt }
    outcomes:
      PROPOSED: merge
      NO_NEW_METHOD: merge
      agent_limit: parked
      agent_backend: parked
      agent_invalid: merge
      timeout: merge

  - name: merge                      # insert new arms + reopen, or end
    block: hunt.merge_scout
    timeout_s: 30
    params: { repo: "{paths.repo}" }
    outcomes: { proposed: done, saturated: done }
