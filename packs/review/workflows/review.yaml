# Industrial review pipeline: no-AI machine core + agent lens + adversarial
# refutation, all findings routed through the finding state machine. Only
# vetted/machine findings reach 'triaged' (and thus egress); speculative
# lens findings are rejected, archived, never posted.
workflow: review
consumes: [review.requested]
emits: [review.completed, finding.triaged, finding.rejected]

steps:
  - name: workspace
    block: worktree.create
    timeout_s: 120
    params: { repo: "{paths.repo}", base: "{payload.branch}" }
    outcomes: { ok: diff, dirty: failed, timeout: failed }

  - name: diff
    block: review.diff
    timeout_s: 60
    params: { base: "{payload.base}" }
    outcomes: { ok: prescan, empty: done, error: failed, timeout: failed }

  # ---- no-AI core: runs and files findings even with every model down ----
  - name: prescan
    block: review.pattern_scan
    timeout_s: 60
    params: { repo: "{paths.repo}" }
    context: [patterns]
    outcomes: { clean: lens, hits: lens, timeout: failed }

  # ---- AI stage 1: propose candidate findings ----------------------------
  - name: lens
    block: agent.run
    llm: review
    schema: review_findings
    timeout_s: 900
    context:
      - payload
      - history                       # prior defects in touched files
      - patterns                      # defect-class lenses to look for
      - lessons: { task_kind: review }
    outcomes:
      FINDINGS: file
      CLEAN: adjudicate               # nothing proposed -> still triage machine hits
      agent_limit: parked             # transient: retry when the model returns
      agent_backend: parked
      agent_invalid: adjudicate       # garbage: degrade to machine findings
      timeout: adjudicate

  - name: file
    block: review.file_findings       # candidates -> findings rows (state found)
    timeout_s: 30
    params: { repo: "{paths.repo}" }
    outcomes: { ok: refute }

  # ---- AI stage 2: adversarial refutation --------------------------------
  - name: refute
    block: agent.run
    llm: refute
    schema: refute_decisions
    timeout_s: 900
    context:
      - payload
      - candidates                    # the lens's own findings, to vet
    outcomes:
      DECIDED: adjudicate
      NONE: adjudicate
      agent_limit: parked
      agent_backend: parked
      agent_invalid: adjudicate       # can't vet -> machine findings still ship
      timeout: adjudicate

  # ---- adjudicate through the state machine, then announce ---------------
  - name: adjudicate
    block: review.adjudicate
    timeout_s: 30
    outcomes: { ok: announce }

  - name: announce
    block: event.emit
    timeout_s: 10
    params:
      name: review.completed
      data:
        request: "{payload}"
        confirmed: "{prev.confirmed}"
        findings: "{prev.findings}"
    outcomes: { ok: done }
